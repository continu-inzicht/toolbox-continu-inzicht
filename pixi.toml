[workspace]
name = "toolbox-continu-inzicht"
version = "0.1.3"
description = "Toolbox voor waterkeringbeheerders om risico's in kaart te brengen."
channels = ["conda-forge"]
platforms = ["win-64", "linux-64"]
readme = "README.md"
license = "GPL-3.0"
license-file = "LICENSE"
repository = "https://github.com/continu-inzicht/toolbox-continu-inzicht"
homepage = "https://continu-inzicht.github.io/toolbox-continu-inzicht/"

[tasks]
# Installation
install = "pre-commit install"
# packing the environment
## When building with pixi pack: `pixi run pack`, you first need to remove tbci
pack = {cmd = "pixi exec pixi-pack ."}
# Lint
pre-commit = "pre-commit run --all-files"
lint = { depends-on = ["pre-commit"] }
# Test
pytest-cov = "pytest --cov --cov-report=xml --benchmark-save=ci-run --ignore=src\\toolbox_continu_inzicht\\base\\adapters"
pytest-cov-html = "pytest --cov --cov-report html:tests/hidden_test_cov --ignore=src\\toolbox_continu_inzicht\\base\\adapters"

# Docs
[tasks.quartodoc-build]
cmd = "quartodoc build && rm objects.json"
cwd = "docs"
env = { PYTHONUTF8 = "1", PYTHONIOENCODING = "utf-8" }
inputs = ["docs/_quarto.yml", "src/continu_inzicht_toolbox"]
outputs = ["docs/reference/"]

[tasks.quartodoc-build-force]
cmd = "quartodoc build && rm objects.json"
cwd = "docs"
env = { PYTHONUTF8 = "1", PYTHONIOENCODING = "utf-8" }
inputs = ["docs/_quarto.yml", "src/continu_inzicht_toolbox"]

[tasks.quarto-preview]
cmd = "quarto preview docs"
env = { QUARTO_PYTHON = "python" }
depends-on = ["quartodoc-build"]

[tasks.quarto-check]
cmd = "quarto check all"
depends-on = ["quartodoc-build"]

[tasks.quarto-render]
cmd = "quarto render docs --to html --execute"
env = { QUARTO_PYTHON = "python" }
depends-on = ["quartodoc-build"]

[feature.common.dependencies]
python = ">=3.11,<3.14" # no support for 3.14 yet in many packages
pandas =">2.0.0,<3.0.0"
pydantic = ">=2"
python-dotenv = ">=1.0.1"
pyyaml = "*"
requests = "*"
httpx = "*"
pyarrow = "*"
sqlalchemy = "*"
psycopg2 = "*"
xarray = "*"
netcdf4 = ">=1.7.1"
openpyxl = "*"
fiona = "*"
geopandas = "*"
pyogrio = "*"
shapely = "*"
openturns = ">=1.23"
# specific to pixi
pip = "*"
rasterstats = ">=0.20.0,<0.21"

# only for testing
[feature.tests.dependencies]
pytest = "*"
pytest-benchmark = "*"
pytest-cov = "*"
pytest-xdist = "*"

# these are only for development needs
[feature.dev.dependencies]
contextily = "*"
ipykernel = "*"
ipywidgets = ">=8.1.5,<9"
jupyter-cache = ">=1.0.0,<2"
jupyterlab = "*"
pandas-stubs = "*"
pre-commit = "*"
quarto = "*"
quartodoc = ">=0.11.1,<0.12"
ruff = "*"
tomli = "*"
tomli-w = "*"
types-requests = "*"
types-pyyaml = "*"
matplotlib = "*"
pixi-pack = ">=0.7.5,<0.8"


[feature.common.pypi-dependencies]
toolbox_continu_inzicht = { path = "src", editable = true }
pydra-core = "==0.0.10"
probabilistic-piping = "==0.0.5"
build = ">=1.3.0, <2"

[environments]
default = { features = ["common","tests", "dev"] }
prod = { features = ["common", "tests"] }
